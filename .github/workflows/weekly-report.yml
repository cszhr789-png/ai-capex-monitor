name: Daily AI Investment Report

on:
  schedule:
    # 7:00 AM Beijing time is 23:00 UTC on the previous day.
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Chinese daily report
        run: python main.py

      - name: Commit report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily AI investment report"
          file_pattern: reports/*.md reports/*.json
